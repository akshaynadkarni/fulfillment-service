syntax = "proto3";

package osac.private.v1;

import "google/protobuf/struct.proto";
import "osac/private/v1/metadata_type.proto";

// A cluster catalog item defines a curated infrastructure offering that references an underlying cluster template.
// Admins control which fields users can set, enforce defaults, and validate input via JSON Schema.
message ClusterCatalogItem {
  string id = 1;
  Metadata metadata = 2;

  // Human friendly short description of the catalog item, suitable for displaying in one single line on a UI or CLI.
  string title = 3;

  // Human friendly long description of the catalog item, using Markdown format.
  string description = 4;

  // Identifier of the underlying cluster template that this catalog item references.
  string template = 5;

  // Whether this catalog item is visible in the public API. Only published items are returned by the public List and
  // Get endpoints (with the exception of unpublished items already referenced by an existing resource).
  bool published = 6;

  // Tenant scope for this catalog item. An empty string means the item is global and visible to all tenants. A
  // non-empty string scopes the item to that specific tenant.
  string tenant = 7;

  // Definitions of the fields that users can or cannot set when creating a resource from this catalog item.
  repeated FieldDefinition field_definitions = 8;
}

// Defines a single field on the resource spec that the catalog item controls. Each field definition specifies whether
// the user can set the field, what default value to apply, and optional JSON Schema validation constraints.
message FieldDefinition {
  // Dot-notation path referencing a field in the resource spec. For example: "spec.network.pod_cidr" or
  // "spec.node_sets.workers.size". Wildcards are not supported.
  string path = 1;

  // Human friendly label for this field, suitable for displaying in a UI.
  string display_name = 2;

  // Whether the user is allowed to set this field. When false, the field value is always taken from the default and
  // any user-provided value is overridden.
  bool editable = 3;

  // Default value for this field. Applied when the user does not provide a value (for editable fields) or always
  // applied (for non-editable fields).
  google.protobuf.Value default = 4;

  // Optional JSON Schema (draft 2020-12) for validating user-provided values of editable fields. The schema is stored
  // as a JSON string. When empty, no validation is performed beyond type checking.
  string validation_schema = 5;
}
